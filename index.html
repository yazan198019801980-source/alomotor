<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ألو موتور - أبو يزن</title>
    <style>
        @keyframes glow { 
            0% { text-shadow: 0 0 5px #ffcc00, 0 0 10px #ffcc00; } 
            50% { text-shadow: 0 0 20px #fff, 0 0 30px #ffcc00; } 
            100% { text-shadow: 0 0 5px #ffcc00, 0 0 10px #ffcc00; } 
        }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; background-color: #1a1a1a; color: white; text-align: center; }
        .overlay { background-color: rgba(0, 0, 0, 0.9); min-height: 100vh; padding-bottom: 40px; }
        .header { background-color: #25D366; padding: 25px; border-bottom: 5px solid #ffcc00; }
        .brand-name { font-size: 26px; font-weight: 900; animation: glow 2s infinite; color: #1a1a1a; line-height: 1.6; }
        .container { padding: 15px; max-width: 500px; margin: auto; }
        .card { background-color: #2d2d2d; margin: 20px 0; padding: 20px; border-radius: 20px; border: 1px solid #444; }
        .status-card { background-color: #931a1a; border: 2px solid #ff4444; display: none; margin-bottom: 15px; } 
        .status-text { font-size: 18px; font-weight: bold; color: white; margin: 0; }
        .ramadan-wish { font-size: 22px; color: #ffcc00; font-weight: bold; animation: glow 1.5s infinite; }
        .input-group { text-align: right; margin-bottom: 10px; }
        label { color: #ffcc00; font-weight: bold; display: block; margin-bottom: 5px; }
        input { width: 100%; padding: 12px; border-radius: 10px; border: 2px solid #ffcc00; text-align: center; font-size: 18px; font-weight: bold; box-sizing: border-box; background: white; color: black; }
        .result-box { font-size: 30px; color: #ffcc00; font-weight: bold; margin-top: 15px; padding: 15px; border: 2px dashed #ffcc00; border-radius: 15px; background: rgba(255,204,0,0.1); }
        .heiba-btn { background: linear-gradient(45deg, #ffcc00, #b89600); color: #000; padding: 15px; border-radius: 10px; cursor: pointer; font-weight: 900; width: 100%; border: none; font-size: 18px; }
        .hidden-content { display: none; padding: 20px 0; }
        .circle-group { display: flex; justify-content: center; gap: 8px; margin: 20px 0; }
        .circle { width: 35px; height: 35px; border-radius: 50%; border: 2px solid #ffcc00; line-height: 35px; cursor: pointer; font-weight: bold; font-size: 18px; transition: 0.3s; color: #ffcc00; }
        .circle.active { background: #ffcc00; color: #000; box-shadow: 0 0 15px #ffcc00; }
        .btn { display: flex; align-items: center; justify-content: center; gap: 12px; width: 100%; margin: 15px auto; padding: 18px; border-radius: 15px; text-decoration: none; font-weight: bold; color: white; font-size: 20px; box-sizing: border-box; }
        .btn-whatsapp { background-color: #25D366; border-bottom: 4px solid #128C7E; }
        .btn-call { background-color: #007bff; border-bottom: 4px solid #0056b3; }
        .btn-sms { background-color: #f39c12; border-bottom: 4px solid #d35400; }
        .footer-msg { font-size: 20px; font-weight: bold; color: #ffcc00; margin-top: 20px; }
    </style>
</head>
<body>

<div class="overlay">
    <div class="header">
        <div class="brand-name">🏍️ أَلُو مٌوتُور أَبُو يَزَن 🏍️<br>ALO MOTOR EBU YEZEN</div>
    </div>

    <div class="container">
        <div id="holidayCard" class="card status-card">
            <p id="holidayMsg" class="status-text"></p>
        </div>

        <div class="card">
            <div class="ramadan-wish">🌙 مُباركة طاعتكم وكل عام وأنتم بخير ✨</div>
        </div>

        <div class="card">
            <h3 style="color: #ffcc00;">💰 حاسبة سعر التوصيل</h3>
            <div class="input-group"><label>📍 من:</label><input type="text" id="fromLoc" placeholder="المكان"></div>
            <div class="input-group"><label>🏁 إلى:</label><input type="text" id="toLoc" placeholder="الجهة"></div>
            <div class="input-group"><label>📏 المسافة (كم):</label><input type="number" id="kmInput" placeholder="أدخل المسافة" oninput="calculate()"></div>
            <div id="priceResult" class="result-box">السعر: 0 ل.ت</div>
        </div>

        <div class="card" style="border: 1px dashed #ffcc00;">
            <label style="font-size: 14px; margin-bottom: 10px;">⚙️ التحكم بحالة الدوام (خاص بأبو يزن):</label>
            <input type="text" id="statusInput" placeholder="اكتب سبب العطلة هنا..." style="margin-bottom: 10px;">
            <div style="display: flex; gap: 10px;">
                <button onclick="updateStatus()" style="flex: 1; padding: 10px; background: #25D366; font-weight: bold; border-radius: 8px; border: none; cursor: pointer;">تفعيل العطلة</button>
                <button onclick="clearStatus()" style="flex: 1; padding: 10px; background: #ff4444; color: white; font-weight: bold; border-radius: 8px; border: none; cursor: pointer;">إلغاء (شغال)</button>
            </div>
        </div>

        <div class="card">
            <button class="heiba-btn" onclick="toggleHeiba()">اضغط وانظر لعرض الهيبة</button>
            <div id="heibaContent" class="hidden-content">
                <h3 style="color: #ffcc00;">كل 6 توصيلات والسابعة مجاناً</h3>
                <input type="text" id="custName" placeholder="اسمك المسجل عندنا" style="margin-bottom: 10px;">
                <input type="text" id="custPhone" placeholder="رقم هاتفك" style="margin-bottom: 10px;">
                <div class="circle-group" id="circles">
                    <div class="circle" onclick="mark(1)">1</div>
                    <div class="circle" onclick="mark(2)">2</div>
                    <div class="circle" onclick="mark(3)">3</div>
                    <div class="circle" onclick="mark(4)">4</div>
                    <div class="circle" onclick="mark(5)">5</div>
                    <div class="circle" onclick="mark(6)">6</div>
                </div>
                <div id="congrats" style="color: #25D366; font-weight: bold; margin: 10px 0;"></div>
                <button onclick="saveAndNotify()" style="background-color: #fff; color: #000; padding: 12px 25px; border-radius: 10px; cursor: pointer; font-weight: bold; border: none; width: 100%;">✅ حفظ وإرسال الإشعار لأبو يزن</button>
            </div>
        </div>

        <div class="card">
            <a href="https://wa.me/963957352181" class="btn btn-whatsapp">🏍️ واتساب ألو موتور</a>
            <a href="tel:+963957352181" class="btn btn-call">📞 اتصال مباشر</a>
            <a href="sms:+963957352181" class="btn btn-sms">✉️ رسالة نصية SMS</a>
        </div>

        <div class="card">
            <h3 style="color: #ffcc00;">📍 مناطق الخدمة</h3>
            <p>إدلب . حلب . سرمدا .
