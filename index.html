<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ألو موتور - أبو يزن</title>
    <style>
        /* أنيميشن التوهج الأصلي */
        @keyframes glow { 0% { text-shadow: 0 0 10px #ffcc00; } 50% { text-shadow: 0 0 20px #fff; } 100% { text-shadow: 0 0 10px #ffcc00; } }
        
        /* أنيميشن الموتور الكبير (يمرق من اليمين لليسار) */
        @keyframes bikePass { 
            0% { right: -300px; opacity: 0; transform: scale(2.5); } 
            20% { opacity: 1; }
            80% { opacity: 1; }
            100% { right: 120%; opacity: 0; transform: scale(2.5); } 
        }

        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: #1a1a1a; color: white; text-align: center; overflow-x: hidden; }
        .header { background-color: #25D366; padding: 25px; border-bottom: 5px solid #ffcc00; position: relative; }
        .brand-name { font-size: 26px; font-weight: 900; animation: glow 2s infinite; color: #1a1a1a; }
        .container { padding: 15px; max-width: 500px; margin: auto; }
        .card { background: #2d2d2d; margin: 15px 0; padding: 20px; border-radius: 20px; border-right: 6px solid #ffcc00; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        
        /* لوحة الإدارة */
        #adminPanel { display: none; background: #333; border: 2px dashed #ffcc00; padding: 15px; border-radius: 15px; margin-bottom: 20px; text-align: right; }
        .status-card { display: none; margin-bottom: 15px; padding: 15px; border-radius: 15px; border: 2px solid white; }

        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 2px solid #ffcc00; text-align: center; font-size: 18px; font-weight: bold; box-sizing: border-box; background: white; color: black; }
        
        .circle-group { display: flex; justify-content: center; gap: 10px; margin: 20px 0; }
        .circle { width: 40px; height: 40px; border-radius: 50%; border: 2px solid #ffcc00; line-height: 40px; cursor: pointer; font-weight: bold; color: #ffcc00; }
        .circle.active { background: #ffcc00; color: #000; box-shadow: 0 0 15px #ffcc00; }

        .btn { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; padding: 18px; border-radius: 15px; text-decoration: none; font-weight: bold; font-size: 18px; margin: 10px 0; border: none; cursor: pointer; color: white; }
        .btn-wa { background: #25D366; }
        .btn-call { background: #007bff; }
        .btn-sms { background: #f39c12; }
        
        /* الموتور الكبير المتحرك */
        #giantBike { 
            position: fixed; top: 45%; right: -300px; font-size: 100px; z-index: 9999; 
            pointer-events: none; opacity: 0; filter: drop-shadow(0 0 10px #ffcc00); 
        }
        #giantBike.run { animation: bikePass 1.2s linear; }

        .service-areas { font-size: 20px; font-weight: 900; color: #ffcc00; animation: glow 1.5s infinite; }
    </style>
</head>
<body onclick="startBike()" ontouchstart="startBike()">

    <div id="giantBike">🏍️</div>

    <div class="header">
        <div class="brand-name">🏍️ أَلُو مٌوتُور أَبُو يَزَن 🏍️</div>
        <button onclick="checkAdmin()" style="position: absolute; bottom: 5px; left: 5px; background: none; border: none; color: #1a1a1a; font-size: 11px; font-weight: bold; cursor: pointer;">⚙️ إدارة النظام</button>
    </div>

    <div class="container">
        <div id="statusCard" class="status-card"><p id="statusMsg"></p></div>

        <div id="adminPanel">
            <h4 style="color: #ffcc00; text-align:center;">⚙️ إعدادات الإدارة</h4>
            <input type="text" id="statusInput" placeholder="📝 سبب العطلة">
            <button onclick="setStatus('available')" style="width:100%; padding:10px; background:#25D366; font-weight:bold; margin-bottom:5px;">✅ متاح</button>
            <button onclick="setStatus('holiday')" style="width:100%; padding:10px; background:#931a1a; color:white; font-weight:bold;">🚫 عطلة</button>
        </div>

        <div class="card">
            <h3 style="color: #ffcc00;">💰 حاسبة سعر التوصيل</h3>
            <input type="number" id="dist" placeholder="📏 المسافة بالكم" oninput="document.getElementById('res').innerText = 'السعر: ' + (this.value * 15) + ' ل.ت'">
            <div id="res" style="font-size:30px; color:#ffcc00; font-weight:bold; margin-top:10px;">السعر: 0 ل.ت</div>
        </div>

        <div class="card">
            <button onclick="document.getElementById('heiba').style.display='block'" style="background:#ffcc00; color:black; padding:15px; width:100%; border:none; border-radius:10px; font-weight:900; font-size:18px;">🎁 عرض الهيبة.. اضغط هنا</button>
            <div id="heiba" style="display:none; padding-top:20px;">
                <input type="text" id="uName" placeholder="👤 الاسم">
                <input type="text" id="uPhone" placeholder="📱 الرقم">
                <div class="circle-group">
                    <script>for(let i=1; i<=6; i++) document.write(`<div class="circle" onclick="setMark(${i})">${i}</div>`);</script>
                </div>
                <button onclick="sendHeiba()" style="width:100%; padding:12px; background:white; color:black; font-weight:bold; border:2px solid #ffcc00; border-radius:10px;">إرسال اشتراك الهيبة</button>
            </div>
        </div>

        <div class="card">
            <a href="https://wa.me/963957352181" class="btn btn-wa">🏍️ واتساب ألو موتور</a>
            <a href="tel:+963957352181" class="btn btn-call">📞 اتصال مباشر</a>
            <a href="sms:+963957352181" class="btn btn-sms">✉️ رسالة SMS</a>
        </div>

        <div class="card">
            <h3 style="color: #ffcc00;">📍 مناطق الخدمة</h3>
            <div class="service-areas">إدلب . حلب . سرمدا . الدانا وماحولها</div>
            <p>🕒 من 5 مساءً وحتى 2 صباحاً</p>
            <p>نتمنى لكم الصحة والعافية ❤️</p>
        </div>
        
        <p style="font-size: 12px; color: #777;">جميع الحقوق محفوظة لألو موتور - أبو يزن © 2026
