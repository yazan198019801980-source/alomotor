<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ألو موتور أبو يزن - VIP</title>
    <style>
        :root { --gold: #ffcc00; --green: #25D366; }
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a1a; color: white; text-align: center; margin: 0; overflow-x: hidden; }
        .header { background: var(--green); padding: 25px; border-bottom: 5px solid var(--gold); position: relative; }
        .container { padding: 15px; max-width: 450px; margin: auto; position: relative; z-index: 2; }
        .card { background: rgba(45, 45, 45, 0.9); margin: 15px 0; padding: 20px; border-radius: 20px; border-right: 6px solid var(--gold); box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .circle { width: 50px; height: 50px; border-radius: 50%; border: 3px solid var(--gold); display: inline-block; margin: 5px; line-height: 48px; font-weight: 900; cursor: pointer; color: var(--gold); transition: 0.3s; }
        .circle.active { background: var(--gold); color: #000; transform: scale(1.1); box-shadow: 0 0 15px var(--gold); }
        .then-text { color: var(--gold); font-weight: 900; display: block; margin: 12px 0; font-size: 18px; text-decoration: underline; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 2px solid var(--gold); text-align: center; font-size: 18px; font-weight: bold; }
        .btn-main { background: linear-gradient(45deg, var(--gold), #ff9900); color: #000; padding: 18px; border-radius: 15px; border: none; width: 100%; font-size: 20px; font-weight: 900; cursor: pointer; margin: 10px 0; }
        .bg-bike { position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%); font-size: 200px; opacity: 0.1; color: red; z-index: 1; pointer-events: none; }
        .status-bar { padding: 12px; background: #333; border: 2px solid var(--gold); margin: 10px; border-radius: 10px; font-weight: bold; color: var(--gold); }
    </style>
</head>
<body onload="checkStorage()">

    <div class="bg-bike">🏍️</div>

    <div class="header">
        <h2 style="margin:0; color:#1a1a1a;">🏍️ أَلُو مٌوتُور أَبُو يَزَن</h2>
        <button onclick="showAdmin()" style="position:absolute; bottom:5px; left:5px; background:none; border:none; color:#1a1a1a; font-size:12px; font-weight:bold;">⚙️ الإدارة</button>
    </div>

    <div class="container">
        <div id="uStatus" class="status-bar">الحالة: متاح للعمل الآن ✅</div>

        <div id="adminP" style="display:none; background:#222; padding:15px; border-radius:15px; border:2px dashed var(--gold); margin-bottom:15px;">
            <input type="text" id="statIn" placeholder="اكتب حالتك هنا">
            <button onclick="updateStat()" style="width:100%; background:var(--green); padding:10px; border-radius:10px; font-weight:bold; margin-bottom:5px;">تحديث</button>
            <button onclick="setStat('في عطلة 🏖️')" style="width:48%; background:red; color:white; padding:10px; border-radius:10px; font-weight:bold;">عطلة</button>
            <button onclick="setStat('متاح للعمل ✅')" style="width:48%; background:green; color:white; padding:10px; border-radius:10px; font-weight:bold;">متاح</button>
        </div>

        <div class="card">
            <h3 style="color:var(--gold); margin-top:0;">📍 اطلب موتور الآن</h3>
            <button onclick="sendLoc()" class="btn-main">إرسال موقعي (واتساب)</button>
        </div>

        <div class="card">
            <h3 style="color:var(--gold); margin-top:0;">🎁 عرض الهيبة (توصيلاتك محفوظة)</h3>
            <span class="then-text">ثم سجل اسمك</span>
            <input type="text" id="userName" placeholder="الاسم المسجل" oninput="saveData()">
            <span class="then-text">ثم سجل رقمك</span>
            <input type="text" id="userPhone" placeholder="رقم الهاتف" oninput="saveData()">
            
            <span class="then-text">ثم اختر رقم التوصيلة</span>
            <div id="circles">
                <script>for(let i=1; i<=6; i++) document.write(`<div class="circle" id="c${i}" onclick="mark(${i})">${i}</div>`);</script>
            </div>
            <span class="then-text">ثم اضغط للإرسال</span>
            <button onclick="sendH()" class="btn-main" style="background:#fff; border:2px solid var(--gold);">إرسال الاشتراك 🚀</button>
        </div>
    </div>

    <script>
        let myNum = "963957352181";
        let currentMark = 0;

        // الشغل الجديد: فحص الذاكرة أول ما يفتح الموقع
        function checkStorage() {
            let m = localStorage.getItem('abu_yazan_mark');
            let n = localStorage.getItem('abu_yazan_name');
            let p = localStorage.getItem('abu_yazan_phone');
            if(m) mark(parseInt(m), false);
            if(n) document.getElementById('userName').value = n;
            if(p) document.getElementById('userPhone').value = p;
        }

        // حفظ الاسم والرقم تلقائياً
        function saveData() {
            localStorage.setItem('abu_yazan_name', document.getElementById('userName').value);
            localStorage.setItem('abu_yazan_phone', document.getElementById('userPhone').value);
        }

        function mark(n, alertMe = true) {
            currentMark = n;
            localStorage.setItem('abu_yazan_mark', n); // حفظ رقم التوصيلة بذاكرة الجوال
            document.querySelectorAll('.circle').forEach((c, i) => {
                if(i < n) c.classList.add('active'); else c.classList.remove('active');
            });
            if(n === 6 && alertMe) alert("🎉 مبروك! حصلت على توصيلة مجانية!");
        }

        function showAdmin() { if(prompt("شفرة الإدارة:") === "123") document.getElementById('adminP').style.display='block'; }
        function setStat(s) { document.getElementById('uStatus').innerText = "الحالة: " + s; }
        function updateStat() { let v = document.getElementById('statIn').value; if(v) setStat(v); }

        function sendLoc() {
            navigator.geolocation.getCurrentPosition(p => {
                let url = `https://maps.google.com/?q=$${p.coords.latitude},${p.coords.longitude}`;
                window.open(`https://wa.me/${myNum}?text=أبو يزن، هذا موقعي للطلب:%0A${url}`);
            }, () => alert("فعل الموقع GPS"));
        }

        function sendH() {
            let n = document.getElementById('userName').value, p = document.getElementById('userPhone').value;
            if(!n || !p || currentMark === 0) return alert("عبي البيانات يا غالي!");
            let msg = `اشتراك هيبة:%0A👤 الاسم: ${n}%0A📱 الرقم: ${p}%0A🔢 التوصيلة: ${currentMark}`;
            window.open(`https://wa.me/${myNum}?text=${msg}`);
        }
    </script>
</body>
</html>
