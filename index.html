<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ألو موتور - أبو يزن</title>
    <style>
        @keyframes glow { 0% { text-shadow: 0 0 10px #ffcc00; } 50% { text-shadow: 0 0 20px #fff; } 100% { text-shadow: 0 0 10px #ffcc00; } }
        @keyframes ring-glow { 0% { box-shadow: 0 0 5px #ff0000; } 50% { box-shadow: 0 0 25px #ff0000, 0 0 35px #fff; } 100% { box-shadow: 0 0 5px #ff0000; } }
        
        @keyframes bikeTransparentRun { 
            0% { right: -300px; opacity: 0; transform: scale(3); } 
            20% { opacity: 0.3; } 
            80% { opacity: 0.3; }
            100% { right: 120%; opacity: 0; transform: scale(3); } 
        }

        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: #1a1a1a; color: white; text-align: center; overflow-x: hidden; }
        .header { background-color: #25D366; padding: 25px; border-bottom: 5px solid #ffcc00; position: relative; }
        .brand-name { font-size: 26px; font-weight: 900; animation: glow 2s infinite; color: #1a1a1a; }
        .container { padding: 15px; max-width: 500px; margin: auto; }
        .card { background: #2d2d2d; margin: 15px 0; padding: 20px; border-radius: 20px; border: 1px solid #444; border-right: 6px solid #ffcc00; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        
        #transBike { 
            position: fixed; top: 40%; right: -300px; font-size: 120px; z-index: 9999; 
            pointer-events: none; opacity: 0; filter: grayscale(1); 
        }
        #transBike.active { animation: bikeTransparentRun 1.5s linear; }

        #adminPanel { display: none; background: #333; border: 2px dashed #ffcc00; padding: 15px; border-radius: 15px; margin-bottom: 20px; text-align: right; }
        .status-card { display: none; margin-bottom: 15px; padding: 15px; border-radius: 15px; border: 2px solid white; }

        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 2px solid #ffcc00; text-align: center; font-size: 18px; font-weight: bold; box-sizing: border-box; background: white; color: black; }
        .hint-text { color: #ffcc00; font-size: 15px; font-weight: bold; display: block; margin-top: 5px; }
        .then-text { color: #fff; font-size: 20px; font-weight: 900; margin: 10px 0; display: block; text-decoration: underline #ffcc00; }

        .circle-group { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin: 20px 0; }
        .circle-wrapper { display: flex; flex-direction: column; align-items: center; }
        .press-here { font-size: 11px; color: #ffcc00; margin-bottom: 5px; font-weight: bold; }
        
        /* تعديل اللون الأحمر هنا */
        .circle { width: 60px; height: 60px; border-radius: 50%; border: 4px solid #ffcc00; line-height: 52px; cursor: pointer; font-weight: 900; font-size: 26px; color: #ffcc00; transition: 0.3s; background: transparent; }
        .circle.active { background: #ff0000; color: #fff; transform: scale(1.2); animation: ring-glow 1s infinite; border-color: #fff; }

        .btn { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; padding: 18px; border-radius: 15px; text-decoration: none; font-weight: bold; font-size: 18px; margin: 10px 0; border: none; cursor: pointer; }
        .btn-location { background: linear-gradient(45deg, #ffcc00, #ff9900); color: #000; border-bottom: 5px solid #b89600; font-size: 16px; font-weight: 900; }
        .btn-whatsapp { background: #25D366; color: white; border-bottom: 4px solid #128C7E; }
        .btn-send-sub { background: white; color: black; border: 3px solid #ffcc00; font-size: 16px; font-weight: 900; }
        
        .result-box { font-size: 30px; color: #ffcc00; font-weight: bold; padding: 15px; border: 2px dashed #ffcc00; border-radius: 15px; margin-top: 10px; background: rgba(255,204,0,0.1); }
    </style>
</head>
<body onclick="runTransBike()" ontouchstart="runTransBike()" onload="initPage()">

        <div class="brand-name">🏍️ أَلُو مٌوتُور أَبُو يَزَن 🏍️<br>ALO MOTOR EBU YEZEN</div>
        <button onclick="checkPass()" style="position: absolute; bottom: 5px; left: 5px; background: none; border: none; color: #1a1a1a; font-size: 12px; cursor: pointer; font-weight: bold;">⚙️ إدارة النظام</button>
    </div>

                                    <div class="circle" id="circle-${i}" onclick="mark(${i})">${i}</div>
                                </div>
                            `);
                        }
                    </script>
