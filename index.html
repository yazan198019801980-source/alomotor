<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ألو موتور - أبو يزن</title>
    <style>
        body { 
            font-family: 'Arial', sans-serif; 
            margin: 0; padding: 0; 
            background-color: #121212; 
            color: white; text-align: center;
        }
        .header { 
            background: #25D366; 
            padding: 20px; font-size: 26px; font-weight: bold; 
            color: black; border-bottom: 5px solid #ffcc00;
        }
        .container { padding: 15px; }
        
        /* كود الصورة الإجباري */
        .main-img { 
            width: 90%; 
            max-width: 350px; 
            margin: 20px auto; 
            border-radius: 15px; 
            border: 3px solid #ffcc00;
            display: block;
        }

        .menu-item { background: #2d2d2d; margin-bottom: 15px; border-radius: 12px; overflow: hidden; border-right: 8px solid #ffcc00; }
        .menu-header { padding: 20px; color: #ffcc00; font-weight: bold; cursor: pointer; font-size: 20px; display: flex; justify-content: space-between; }
        .menu-content { display: none; padding: 20px; background: #1e1e1e; text-align: right; border-top: 1px solid #444; }

        input { width: 85%; padding: 15px; margin: 10px 0; border-radius: 10px; border: none; font-size: 22px; text-align: center; }
        .result { font-size: 28px; color: #25D366; font-weight: bold; }
        
        .btn { display: block; width: 90%; margin: 10px auto; padding: 18px; border-radius: 12px; text-decoration: none; font-weight: bold; font-size: 20px; color: white; }
        .btn-whatsapp { background-color: #25D366; }
        .btn-call { background-color: #007bff; }
        .btn-sms { background-color: #f39c12; }
    </style>
</head>
<body>

    <div class="header">🏍️ ألو موتور (أبو يزن)</div>

    <div class="container">
        
        <img src="Screenshot_2026-03-18-07-19-58-783_com.google.android.googlequicksearchbox.jpg" class="main-img" alt="ألو موتور">

        <div class="menu-item">
            <div class="menu-header" onclick="toggleMenu('info')">📋 تفاصيل العمل <span>▼</span></div>
            <div id="info" class="menu-content">
                <p>✅ <b>توصيل طلبات فقط:</b> (أغراض، طرود، أمانات).</p>
                <p>📍 <b>المناطق:</b> إدلب - سرمدا - الدانا.</p>
                <p>🕒 <b>الدوام:</b> من 5:00 عصراً حتى 2:00 صباحاً.</p>
            </div>
        </div>

        <div class="menu-item">
            <div class="menu-header" onclick="toggleMenu('calc')">💰 حاسبة التوصيل <span>▼</span></div>
            <div id="calc" class="menu-content">
                <p>أدخل الكيلومترات:</p>
                <input type="number" id="dist" placeholder="0" oninput="calcPrice()">
                <div id="res" class="result">السعر: 0 ل.ت</div>
            </div>
        </div>

        <a href="https://wa.me/963957352181" class="btn btn-whatsapp">💬 واتساب</a>
        <a href="tel:+963957352181" class="btn btn-call">📞 اتصال مباشر</a>
        <a href="sms:+963957352181" class="btn btn-sms">✉️ رسالة نصية SMS</a>

    </div>

    <script>
        function toggleMenu(id) {
            var content = document.getElementById(id);
            content.style.display = (content.style.display === "block") ? "none" : "block";
        }
        function calcPrice() {
            var d = document.getElementById('dist').value;
            document.getElementById('res').innerText = "السعر: " + (d * 15) + " ل.ت";
        }
    </script>

</body>
</html>
