<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ألو موتور - أبو يزن</title>
    <style>
        @keyframes glow { 
            0% { text-shadow: 0 0 5px #ffcc00, 0 0 10px #ffcc00; } 
            50% { text-shadow: 0 0 20px #fff, 0 0 30px #ffcc00; } 
            100% { text-shadow: 0 0 5px #ffcc00, 0 0 10px #ffcc00; } 
        }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; background-color: #1a1a1a; color: white; text-align: center; }
        .overlay { background-color: rgba(0, 0, 0, 0.9); min-height: 100vh; padding-bottom: 40px; }
        .header { background-color: #25D366; padding: 25px; border-bottom: 5px solid #ffcc00; position: relative; }
        .brand-name { font-size: 26px; font-weight: 900; animation: glow 2s infinite; color: #1a1a1a; line-height: 1.6; }
        .container { padding: 15px; max-width: 500px; margin: auto; }
        .card { background-color: #2d2d2d; margin: 20px 0; padding: 20px; border-radius: 20px; border: 1px solid #444; }
        .status-card { background-color: #931a1a; border: 2px solid #ff4444; display: none; margin-bottom: 15px; padding: 15px; border-radius: 15px; } 
        #adminPanel { display: none; background: #333; border: 1px dashed #ffcc00; padding: 15px; border-radius: 15px; margin-bottom: 20px; text-align: right; }
        input { width: 100%; padding: 12px; border-radius: 10px; border: 2px solid #ffcc00; text-align: center; font-size: 18px; font-weight: bold; box-sizing: border-box; background: white; color: black; margin-bottom: 10px; }
        .result-box { font-size: 30px; color: #ffcc00; font-weight: bold; margin-top: 15px; padding: 15px; border: 2px dashed #ffcc00; border-radius: 15px; background: rgba(255,204,0,0.1); }
        .heiba-btn { background: linear-gradient(45deg, #ffcc00, #b89600); color: #000; padding: 15px; border-radius: 10px; cursor: pointer; font-weight: 900; width: 100%; border: none; font-size: 18px; }
        .circle-group { display: flex; justify-content: center; gap: 8px; margin: 20px 0; }
        .circle { width: 35px; height: 35px; border-radius: 50%; border: 2px solid #ffcc00; line-height: 35px; cursor: pointer; font-weight: bold; color: #ffcc00; }
        .circle.active { background: #ffcc00; color: #000; box-shadow: 0 0 15px #ffcc00; }
        .btn { display: flex; align-items: center; justify-content: center; gap: 12px; width: 100%; margin: 15px auto; padding: 18px; border-radius: 15px; text-decoration: none; font-weight: bold; color: white; font-size: 20px; box-sizing: border-box; }
        .btn-whatsapp { background-color: #25D366; border-bottom: 4px solid #128C7E; }
        .footer-msg { font-size: 20px; font-weight: bold; color: #ffcc00; margin-top: 20px; }
    </style>
</head>
<body>

<div class="overlay">
    <div class="header">
        <div class="brand-name">🏍️ أَلُو مٌوتُور أَبُو يَزَن 🏍️</div>
        <button onclick="checkPass()" style="position: absolute; bottom: 2px; left: 5px; background: none; border: none; color: #1a1a1a; font-size: 11px; cursor: pointer; font-weight: bold;">إدارة النظام</button>
    </div>

    <div class="container">
        <div id="holidayCard" class="status-card"><p id="holidayMsg" style="font-weight:bold; margin:0;"></p></div>

        <div id="adminPanel">
            <h4 style="color: #ffcc00; margin: 0 0 10px 0; text-align:center;">⚙️ إعدادات أبو يزن</h4>
            
            <label>📝 سبب العطلة:</label>
            <input type="text" id="statusInput" placeholder="اكتب السبب هنا">
            <div style="display: flex; gap: 5px; margin-bottom: 15px;">
                <button onclick="setHoliday()" style="flex:1; padding:10px; background:#25D366; border:none; border-radius:5px; font-weight:bold;">تفعيل</button>
                <button onclick="removeHoliday()" style="flex:1; padding:10px; background:#ff4444; color:white; border:none; border-radius:5px; font-weight:bold;">إلغاء</button>
            </div>

            <hr style="border: 0.5px solid #444;">
            
            <label>🔑 تغيير شفرة الدخول:</label>
            <input type="password" id="newPassInput" placeholder="أدخل الشفرة الجديدة">
            <button onclick="changePassword()" style="width:100%; padding:10px; background:#ffcc00; border:none; border-radius:5px; font-weight:bold; color:black;">حفظ الشفرة الجديدة</button>
        </div>

        <div class="card"><h3 style="color: #ffcc00;">💰 حاسبة التوصيل (15 ليرة)</h3>
            <input type="number" id="kmInput" placeholder="أدخل الكيلومترات" oninput="calculate()">
            <div id="priceResult" class="result-box">0 ل.ت</div>
        </div>

        <div class="card">
            <button class="heiba-btn" onclick="document.getElementById('heibaContent').style.display='block'">🎁 عرض الهيبة.. اضغط هنا</button>
            <div id="heibaContent" style="display:none; padding-top:20px;">
                <div class="circle-group">
                    <div class="circle" onclick="mark(1)">1</div><div class="circle" onclick="mark(2)">2</div>
                    <div class="circle" onclick="mark(3)">3</div><div class="circle" onclick="mark(4)">4</div>
                    <div class="circle" onclick="mark(5)">5</div><div class="circle" onclick="mark(6)">6</div>
                </div>
                <button onclick="sendWp()" style="width:100%; padding:12px; background:white; color:black; font-weight:bold; border-radius:10px; border:none;">إرسال واتساب</button>
            </div>
        </div>

        <div class="card">
            <a href="https://wa.me/963957352181" class="btn btn-whatsapp">🏍️ واتساب ألو موتور</a>
        </div>

        <div class="card">
            <h2 class="footer-msg" style="animation: glow 2s infinite;">انتظرو عرض الهيبة</h2>
        </div>
    </div>
</div>

<script>
    let currentMark = 0;

    // جلب الشفرة من الذاكرة أو استخدام الافتراضية 1234
    function getPass() { return localStorage.getItem("admin_pass") || "1234"; }

    function checkPass() {
        let p = prompt("أدخل شفرة الإدارة:");
        if (p === getPass()) {
            let panel = document.getElementById("adminPanel");
            panel.style.display = (panel.style.display === "block") ? "none" : "block";
        } else if (p !== null) { alert("الشفرة غلط!"); }
    }

    function changePassword() {
        let newP = document.getElementById("newPassInput").value;
        if (newP.length > 0) {
            localStorage.setItem("admin_pass", newP);
            alert("تم تغيير الشفرة بنجاح إلى: " + newP);
            document.getElementById("newPassInput").value = "";
        }
    }

    function setHoliday() {
        let m = document.getElementById("statusInput").value;
        if(m) {
            document.getElementById("holidayCard").style.display = "block";
            document.getElementById("holidayMsg").innerText = "اليوم عطلة: " + m;
            localStorage.setItem("holiday_msg", m);
        }
    }

    function removeHoliday() {
        document.getElementById("holidayCard").style.display = "none";
        localStorage.removeItem("holiday_msg");
    }

    window.onload = function() {
        let s = localStorage.getItem("holiday_msg");
        if(s) { document.getElementById("holidayCard").style.display = "block"; document.getElementById("holidayMsg").innerText = "اليوم عطلة: " + s; }
    }

    function calculate() {
        let km = document.getElementById('kmInput').value;
        document.getElementById('priceResult').innerText = (km * 15) + " ل.ت";
    }

    function mark(n) {
        currentMark = n;
        let cs = document.querySelectorAll('.circle');
        cs.forEach((c, i) => i < n ? c.classList.add('active') : c.classList.remove('active'));
    }

    function sendWp() {
        window.open(`https://wa.me/963957352181?text=تثبيت توصيلة رقم ${currentMark}`, '_blank');
    }
</script>
</body>
</html>
